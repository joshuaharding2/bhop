name: Mirror Repository Sync

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]

jobs:
  mirror_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Mirror Repo
        run: |
          git clone --mirror https://github.com/joshuaharding2/bhop.git source-mirror
          cd source-mirror
          git push --mirror https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/bhop-game/bhop-game.github.io
